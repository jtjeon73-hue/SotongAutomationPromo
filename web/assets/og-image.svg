<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="50%" style="stop-color:#1B2838"/>
      <stop offset="100%" style="stop-color:#1A3A4A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#4DB6AC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#4DB6AC" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="120" fill="#00897B" opacity="0.08"/>
  <circle cx="100" cy="550" r="80" fill="#4DB6AC" opacity="0.06"/>

  <!-- Accent bar -->
  <rect x="80" y="200" width="6" height="80" fill="url(#accent)" rx="3"/>

  <!-- Main title -->
  <text x="110" y="230" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF">
    īĄĶ┤ ░┼É┘T
  </text>

  <!-- Subtitle -->
  <text x="110" y="300" font-family="Arial, sans-serif" font-size="32" font-weight="500" fill="#4DB6AC">
    Production Line Monitoring
  </text>

  <!-- Keywords -->
  <text x="110" y="370" font-family="Arial, sans-serif" font-size="24" fill="#B0BEC5">
    PLC Ę MES Ę Barcode Ę Tool Data
  </text>

  <!-- Bottom decorative line -->
  <rect x="80" y="480" width="400" height="3" fill="url(#accent)" rx="1.5" opacity="0.6"/>

  <!-- Icon-like elements -->
  <g transform="translate(900, 250)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#1B2838" stroke="#00897B" stroke-width="2" opacity="0.9"/>
    <rect x="20" y="20" width="60" height="8" rx="2" fill="#4DB6AC" opacity="0.8"/>
    <rect x="20" y="40" width="140" height="6" rx="2" fill="#546E7A" opacity="0.6"/>
    <rect x="20" y="55" width="100" height="6" rx="2" fill="#546E7A" opacity="0.4"/>
    <polyline points="20,90 50,70 80,80 110,50 140,60" fill="none" stroke="#00897B" stroke-width="2"/>
    <circle cx="140" cy="60" r="4" fill="#4DB6AC"/>
  </g>
</svg>
